name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
